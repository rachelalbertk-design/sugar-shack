<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Sugar Shack app icon</title>
  <desc id="desc">A neon Sugar Shack monogram over a hidden lounge door.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3a1730"/>
      <stop offset="0.52" stop-color="#18101a"/>
      <stop offset="1" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff7ab8"/>
      <stop offset="1" stop-color="#65f3ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 1 0 0 0.45  0 0 1 0 0.78  0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <path d="M160 330h704v110H160z" fill="#ffd2e6"/>
  <path d="M194 360h636v50H194z" fill="#ff7ab8" opacity="0.42"/>
  <rect x="240" y="424" width="544" height="378" rx="42" fill="#100d12" stroke="#65f3ff" stroke-width="12"/>
  <rect x="286" y="480" width="452" height="98" rx="28" fill="#fff2d4"/>
  <rect x="318" y="630" width="154" height="172" rx="18" fill="#271622" stroke="#ff7ab8" stroke-width="10"/>
  <rect x="552" y="630" width="154" height="172" rx="18" fill="#271622" stroke="#65f3ff" stroke-width="10"/>
  <circle cx="512" cy="456" r="68" fill="#100d12" stroke="url(#neon)" stroke-width="16" filter="url(#glow)"/>
  <text x="512" y="558" text-anchor="middle" font-family="Courier New, monospace" font-size="190" font-weight="700" fill="url(#neon)" filter="url(#glow)">SS</text>
  <path d="M310 724h404" stroke="#fff2d4" stroke-width="12" stroke-linecap="round" opacity="0.34"/>
</svg>
